<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F76 Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>F76 Tracker</h1>
      <div class="reset-timers">
        <span>Daily: <span id="daily-timer">--:--:--</span></span>
        <span>Weekly: <span id="weekly-timer">--:--:--</span></span>
      </div>
    </header>

    <div class="layout">
      <aside class="buff-panel" id="buff-panel">
        <div class="category-header">Active Effects</div>
        <div id="buff-list"></div>
        <div class="add-item">
          <input type="text" id="new-buff-name" placeholder="Buff name...">
          <input type="number" id="new-buff-duration" placeholder="Min" min="1" style="width: 60px;">
          <button id="add-buff-btn">Add</button>
        </div>
      </aside>
      <main id="tracker"></main>
    </div>

    <div class="modal-overlay" id="edit-modal">
      <div class="modal">
        <h2>Edit Item</h2>
        <input type="text" id="edit-name" placeholder="Item name">
        <div class="modal-buttons">
          <button class="cancel" id="edit-cancel">Cancel</button>
          <button id="edit-save">Save</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="buff-edit-modal">
      <div class="modal">
        <h2>Edit Buff</h2>
        <input type="text" id="buff-edit-name" placeholder="Buff name">
        <input type="number" id="buff-edit-duration" placeholder="Duration (minutes)" min="1">
        <div class="modal-buttons">
          <button class="cancel" id="buff-edit-cancel">Cancel</button>
          <button id="buff-edit-save">Save</button>
        </div>
      </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
